<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watermark Studio</title>
  <link id="faviconLink" rel="icon" href="assets/icons/theme-dark.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="panel panel-left">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <img class="brand-icon brand-icon-dark" src="assets/icons/theme-dark.png" alt="">
          <img class="brand-icon brand-icon-light" src="assets/icons/theme-light.png" alt="">
        </div>
        <div>
          <div class="brand-title-row">
            <h1>Watermark Studio</h1>
            <label class="theme-switch" for="themeToggle" title="切换浅色 / 深色模式" aria-label="切换浅色 / 深色模式">
              <input id="themeToggle" type="checkbox">
              <i aria-hidden="true"></i>
            </label>
          </div>
          <p>本地 PNG 水印工具</p>
        </div>
      </div>

      <section class="control-group thumbnail-section">
        <div class="section-heading">
          <h2>照片列表</h2>
          <span id="photoCount">0 张</span>
        </div>
        <input id="photoInput" type="file" accept="image/jpeg,image/png,image/webp" multiple>
        <div class="selection-toolbar">
          <span id="selectionStatus">已选 0 / 共 0</span>
          <div>
            <button id="deleteSelectedButton" class="delete-selected" type="button">删除选中</button>
            <button id="selectAllButton" type="button">全选</button>
            <button id="clearSelectionButton" type="button">取消</button>
          </div>
        </div>
        <div id="thumbnailList" class="thumbnail-list" aria-label="已导入图片缩略图"></div>
      </section>

      <section class="control-group">
        <div class="section-heading">
          <h2>水印内容</h2>
          <span>PNG / 文本</span>
        </div>
        <label class="file-picker secondary" for="watermarkInput">
          <span>上传 PNG 水印</span>
          <small>透明背景 PNG</small>
        </label>
        <input id="watermarkInput" type="file" accept="image/png">
        <label class="text-control" for="textWatermarkInput">
          <span>文本水印</span>
          <textarea id="textWatermarkInput" rows="2" placeholder="Copyright"></textarea>
        </label>
        <label class="color-control" for="textColorInput">
          <span>文字颜色</span>
          <input id="textColorInput" type="color" value="#ffffff">
        </label>
        <p id="watermarkStatus" class="notice">正在加载默认水印...</p>
      </section>
    </aside>

    <main class="preview-area">
      <div class="canvas-wrap">
        <canvas id="previewCanvas" aria-label="图片水印预览"></canvas>
        <div id="emptyState" class="empty-state">请导入一张图片开始添加水印</div>
      </div>
      <div id="messageBar" class="message-bar" role="status" aria-live="polite"></div>
    </main>

    <aside class="panel panel-right">
      <section class="control-group">
        <div class="section-heading">
          <h2>水印样式</h2>
          <span>大小 / 透明度</span>
        </div>

        <label class="range-control" for="sizeRange">
          <span>水印大小</span>
          <strong id="sizeValue">15</strong>
        </label>
        <input id="sizeRange" type="range" min="0" max="100" value="15">

        <label class="range-control" for="opacityRange">
          <span>透明度</span>
          <strong id="opacityValue">100</strong>
        </label>
        <input id="opacityRange" type="range" min="0" max="100" value="100">

        <label class="range-control" for="marginRange">
          <span>边距</span>
          <strong id="marginValue">60</strong>
        </label>
        <input id="marginRange" type="range" min="0" max="30" value="6">

        <label class="switch-control" for="invertToggle">
          <span>水印反色</span>
          <input id="invertToggle" type="checkbox">
          <i aria-hidden="true"></i>
        </label>

        <label class="select-control" for="watermarkLayoutSelect">
          <span>排列方式</span>
          <select id="watermarkLayoutSelect">
            <option value="horizontal">横排</option>
            <option value="vertical">竖排</option>
            <option value="image-only">仅 PNG</option>
            <option value="text-only">仅文本</option>
          </select>
        </label>
      </section>

      <section class="control-group">
        <div class="section-heading">
          <h2>锚点位置</h2>
          <span>9 点定位</span>
        </div>
        <div class="position-grid" role="radiogroup" aria-label="水印位置">
          <label title="左上"><input type="radio" name="position" value="top-left"><span>左上</span></label>
          <label title="上中"><input type="radio" name="position" value="top-center"><span>上中</span></label>
          <label title="右上"><input type="radio" name="position" value="top-right"><span>右上</span></label>
          <label title="左中"><input type="radio" name="position" value="middle-left"><span>左中</span></label>
          <label title="居中"><input type="radio" name="position" value="center"><span>居中</span></label>
          <label title="右中"><input type="radio" name="position" value="middle-right"><span>右中</span></label>
          <label title="左下"><input type="radio" name="position" value="bottom-left"><span>左下</span></label>
          <label title="下中"><input type="radio" name="position" value="bottom-center" checked><span>下中</span></label>
          <label title="右下"><input type="radio" name="position" value="bottom-right"><span>右下</span></label>
        </div>
      </section>

      <section class="control-group export-settings">
        <div class="export-column">
          <div class="export-block">
            <div class="section-heading">
              <h2>文件命名</h2>
              <span id="filenamePreviewValue">--</span>
            </div>
            <label class="text-control" for="filenamePrefixInput">
              <span>文件名前缀</span>
              <input id="filenamePrefixInput" type="text" placeholder="optional">
            </label>
            <label class="text-control" for="filenameSuffixInput">
              <span>文件名后缀</span>
              <input id="filenameSuffixInput" type="text" value="_watermarked">
            </label>
          </div>

          <div class="export-block">
            <div class="section-heading">
              <h2>调整图片大小</h2>
              <span id="outputSizeValue">3000 x 3000</span>
            </div>
            <div class="size-grid">
              <label class="number-control" for="resizeWidthInput">
                <span>W</span>
                <input id="resizeWidthInput" type="number" min="1" max="50000" step="1" value="3000">
              </label>
              <label class="number-control" for="resizeHeightInput">
                <span>H</span>
                <input id="resizeHeightInput" type="number" min="1" max="50000" step="1" value="3000">
              </label>
              <label class="number-control" for="resizePercentInput">
                <span>百分比</span>
                <input id="resizePercentInput" type="number" min="1" max="1000" step="1" value="100">
              </label>
            </div>
            <label class="switch-control" for="resizeAspectToggle">
              <span>锁定宽高比例</span>
              <input id="resizeAspectToggle" type="checkbox" checked>
              <i aria-hidden="true"></i>
            </label>
          </div>

          <div class="export-block">
            <div class="section-heading">
              <h2>输出锐化</h2>
            </div>
            <label class="select-control" for="outputSharpeningSelect">
              <span>锐化</span>
              <select id="outputSharpeningSelect">
                <option value="none">关闭</option>
                <option value="low">低</option>
                <option value="standard">标准</option>
                <option value="high">高</option>
              </select>
            </label>
          </div>
        </div>

        <div class="export-column">
          <div class="export-block">
            <div class="section-heading">
              <h2>文件设置</h2>
              <span id="qualityHint">JPG / WEBP</span>
            </div>
            <label class="select-control" for="formatSelect">
              <span>图片格式</span>
              <select id="formatSelect">
                <option value="jpeg">JPG</option>
                <option value="png">PNG</option>
                <option value="webp">WEBP</option>
              </select>
            </label>
            <label class="range-control" for="qualityRange">
              <span>品质</span>
              <strong id="qualityValue">95</strong>
            </label>
            <input id="qualityRange" type="range" min="1" max="100" value="95">
            <label class="select-control" for="colorSpaceSelect">
              <span>色彩空间</span>
              <select id="colorSpaceSelect">
                <option value="srgb">sRGB</option>
                <option value="display-p3">Display P3</option>
              </select>
            </label>
            <label class="switch-control" for="targetFileSizeToggle">
              <span>限制文件大小</span>
              <input id="targetFileSizeToggle" type="checkbox">
              <i aria-hidden="true"></i>
            </label>
            <label class="number-control" for="targetFileSizeInput">
              <span>目标大小 KB</span>
              <input id="targetFileSizeInput" type="number" min="20" max="512000" step="10" value="1024">
            </label>
          </div>

          <div class="export-block">
            <div class="section-heading">
              <h2>元数据</h2>
            </div>
            <label class="select-control" for="metadataSelect">
              <span>元数据</span>
              <select id="metadataSelect">
                <option value="none">无</option>
                <option value="copyright">版权</option>
                <option value="copyright-contact" selected>版权和联系信息</option>
                <option value="all-except-camera">除相机信息外的全部</option>
                <option value="all">全部</option>
              </select>
            </label>
            <div id="metadataFields" class="metadata-fields">
              <label class="text-control" for="metadataAuthorInput">
                <span>作者</span>
                <input id="metadataAuthorInput" type="text">
              </label>
              <label class="text-control" for="metadataCopyrightInput">
                <span>版权</span>
                <input id="metadataCopyrightInput" type="text">
              </label>
              <label class="text-control" for="metadataContactInput">
                <span>联系方式</span>
                <input id="metadataContactInput" type="text">
              </label>
            </div>
          </div>
        </div>

        <div class="segmented-control" role="radiogroup" aria-label="导出方式">
          <label><input type="radio" name="exportDelivery" value="separate"><span>单张文件</span></label>
          <label><input type="radio" name="exportDelivery" value="zip" checked><span>ZIP 包</span></label>
        </div>
      </section>

      <button id="exportButton" class="export-button" type="button">导出</button>
    </aside>
  </div>

  <script src="js/state.js"></script>
  <script src="js/canvas-renderer.js"></script>
  <script src="js/watermark-image.js"></script>
  <script src="js/export.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
